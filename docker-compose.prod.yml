# =============================================================================
# Osijek AI Guide - Lega API
# Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Important:
# - Always use a strong JWT_SECRET_KEY in production
# - Set ENVIRONMENT=production
# - Use the production Docker target
# =============================================================================

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: lega-api-prod
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - ENVIRONMENT=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    volumes:
      # Persist SQLite database and JSON data
      - lega-prod-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  lega-prod-data:
    driver: local
